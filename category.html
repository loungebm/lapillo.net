<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - lapillo</title>
    <link href="https://cdn.jsdelivr.net/npm/@shadcn/ui@latest/dist/tailwind.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="studio-lapillo.css">
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat-storage.js"></script>
    
    <!-- Firebase м„Өм • л°Ҹ м»ҙнҸ¬л„ҢнҠё мӢңмҠӨн…ң -->
    <script src="js/firebase-cdn.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/navigation-manager.js"></script>
    <script src="js/mobile-menu.js"></script>
</head>
<body class="bg-white font-sans">
    <!-- Header Component Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Portfolio Grid Section -->
    <main class="py-6">
        <div class="portfolio-grid-wrapper">
            <div class="portfolio-grid collection-content-wrapper" id="gridThumbs">
                
                <!-- Firebaseм—җм„ң лЎңл“ңн•  л•Ңк№Ңм§Җ лЎңл”© н‘ңмӢң 
                <div id="loading" class="col-span-full text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mb-4"></div>
                    <p class="text-gray-600">нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл”© мӨ‘...</p>
                </div> -->
            </div>
        </div>
    </main>

    <!-- Footer Component Placeholder -->
    <div id="footer-placeholder"></div>

    <script>
        // URLм—җм„ң м№ҙн…Ңкі лҰ¬ ID м¶”м¶ң
        function getCategoryIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('category');
        }

        // м№ҙн…Ңкі лҰ¬лі„ нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл“ң н•ЁмҲҳ
        async function loadCategoryPortfolios(categoryId) {
            try {
                console.log(`рҹҺЁ ${categoryId} м№ҙн…Ңкі лҰ¬ нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл”© мӢңмһ‘...`);
                
                // Firebase м„ңл№„мҠӨ лҢҖкё°
                let retryCount = 0;
                while (!window.firebaseService && retryCount < 10) {
                    console.log(`вҸі Firebase м„ңл№„мҠӨ лҢҖкё° мӨ‘... (${retryCount + 1}/10)`);
                    await new Promise(resolve => setTimeout(resolve, 500));
                    retryCount++;
                }
                
                if (!window.firebaseService) {
                    throw new Error('Firebase м„ңл№„мҠӨлҘј мҙҲкё°нҷ”н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
                }
                
                // FirebaseServiceлҘј нҶөн•ң нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл“ң
                const allPortfolios = await window.firebaseService.getAllPortfolios();
                console.log(`рҹ“Ұ м „мІҙ нҸ¬нҠёнҸҙлҰ¬мҳӨ:`, allPortfolios.length, 'к°ң');
                console.log(`рҹ”Қ м№ҙн…Ңкі лҰ¬лі„ л¶„нҸ¬:`, allPortfolios.reduce((acc, p) => {
                    const cat = p.category || 'design';
                    acc[cat] = (acc[cat] || 0) + 1;
                    return acc;
                }, {}));
                
                const filteredPortfolios = allPortfolios.filter(p => 
                    (p.category || 'design') === categoryId
                );
                
                // dateSort кё°мӨҖмңјлЎң м •л ¬ (н”„лЎңм қнҠё лӮ м§ң мөңмӢ мҲң)
                filteredPortfolios.sort((a, b) => {
                    const dateA = a.dateSort || '';
                    const dateB = b.dateSort || '';
                    return dateB.localeCompare(dateA);  // лӮҙлҰјм°ЁмҲң
                });
                
                console.log(`вң… лЎңл“ңлҗң ${categoryId} нҸ¬нҠёнҸҙлҰ¬мҳӨ:`, filteredPortfolios.length, 'к°ң');
                console.log(`рҹ”„ м •л ¬ кё°мӨҖ: dateSort (н”„лЎңм қнҠё лӮ м§ң мөңмӢ мҲң)`);
                console.log(`рҹҺҜ мҡ”мІӯн•ң м№ҙн…Ңкі лҰ¬ ID: "${categoryId}"`);
                
                // мІ« лІҲм§ё нҸ¬нҠёнҸҙлҰ¬мҳӨмқҳ м№ҙн…Ңкі лҰ¬ м •ліҙ нҷ•мқё
                if (allPortfolios.length > 0) {
                    console.log(`рҹ“„ мІ« лІҲм§ё нҸ¬нҠёнҸҙлҰ¬мҳӨ м№ҙн…Ңкі лҰ¬:`, allPortfolios[0].category);
                }
                
                // лЎңл”© мҲЁкё°кё°
                const loadingElement = document.getElementById('loading');
                if (loadingElement) {
                    loadingElement.style.display = 'none';
                }
                
                // нҸ¬нҠёнҸҙлҰ¬мҳӨ л ҢлҚ”л§Ғ
                const gridContainer = document.getElementById('gridThumbs');
                if (gridContainer) {
                    gridContainer.innerHTML = ''; // кё°мЎҙ лӮҙмҡ© мҙҲкё°нҷ”
                    
                    if (filteredPortfolios.length > 0) {
                        filteredPortfolios.forEach(portfolio => {
                            const gridItem = document.createElement('a');
                            gridItem.className = 'grid-item';
                            gridItem.href = `portfolio-detail.html?id=${portfolio.id}`;
                            
                            gridItem.innerHTML = `
                                <div class="grid-image">
                                    <div class="grid-image-inner-wrapper">
                                        <img src="${portfolio.thumbnail || './img/placeholder.jpg'}" 
                                             alt="${portfolio.englishTitle || portfolio.title || 'Portfolio'}" 
                                             class="portfolio-image"
                                             onerror="this.src='./img/placeholder.jpg'">
                                    </div>
                                </div>
                                <div class="portfolio-text">
                                    <h3 class="portfolio-title">${portfolio.englishTitle || portfolio.title || 'Untitled'}</h3>
                                </div>
                            `;
                            
                            gridContainer.appendChild(gridItem);
                        });
                        console.log(`вң… ${categoryId} нҸ¬нҠёнҸҙлҰ¬мҳӨ л ҢлҚ”л§Ғ мҷ„лЈҢ`);
                    } else {
                        gridContainer.innerHTML = `
                            <div class="col-span-full text-center py-12">
                                <p class="text-gray-500">${categoryId} м№ҙн…Ңкі лҰ¬м—җ нҸ¬нҠёнҸҙлҰ¬мҳӨк°Җ м—ҶмҠөлӢҲлӢӨ.</p>
                            </div>
                        `;
                        console.log(`вҡ пёҸ ${categoryId} нҸ¬нҠёнҸҙлҰ¬мҳӨ м—ҶмқҢ`);
                    }
                }
                
            } catch (error) {
                console.error(`вқҢ ${categoryId} нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл“ң м—җлҹ¬:`, error);
                
                const loadingElement = document.getElementById('loading');
                if (loadingElement) {
                    loadingElement.style.display = 'none';
                }
                
                const gridContainer = document.getElementById('gridThumbs');
                if (gridContainer) {
                    gridContainer.innerHTML = `
                        <div class="text-center text-red-500 py-12">
                            <p>${categoryId} нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл”©м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.</p>
                            <p class="text-sm mt-2">мҳӨлҘҳ: ${error.message}</p>
                            <button onclick="loadCategoryPortfolios('${categoryId}')" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                лӢӨмӢң мӢңлҸ„
                            </button>
                        </div>
                    `;
                }
            }
        }

        // лӘЁл°”мқј л©”лүҙ мғҒнғң кҙҖлҰ¬
        let mobileMenuOpen = false;

        // лҸҷм Ғ л©”лүҙ мҠӨнғҖмқј кі„мӮ°
        function calculateDynamicMenuStyles() {
            const header = document.querySelector('header');
            const viewportHeight = window.innerHeight;
            const viewportWidth = window.innerWidth;

            if (header) {
                const headerHeight = header.offsetHeight;
                document.documentElement.style.setProperty('--header-height', headerHeight + 'px');
            }

            const availableHeight = viewportHeight - (header ? header.offsetHeight : 80);
            
            // л©”лүҙ к°„кІ© кі„мӮ° (80%лЎң мӨ„мһ„)
            const menuGap = Math.max(0.6, Math.min(1.2, availableHeight * 0.08 / 16 * 0.8));
            document.documentElement.style.setProperty('--menu-gap', menuGap + 'rem');
            
            // нҸ°нҠё нҒ¬кё° кі„мӮ° (нҳ„мһ¬мқҳ 90% вҶ’ м¶”к°Җ 90% = 81%)
            const fontSize = Math.max(1.4, Math.min(2.2, viewportWidth * 0.045 * 0.81));
            document.documentElement.style.setProperty('--menu-font-size', fontSize + 'rem');
        }

        // лӘЁл°”мқј л©”лүҙ нҶ кёҖ
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobile-menu');
            const hamburgerBtn = document.getElementById('hamburger-btn');
            
            if (!mobileMenu || !hamburgerBtn) {
                console.error('вқҢ Elements not found');
                return;
            }
            
            mobileMenuOpen = !mobileMenuOpen;
            
            if (mobileMenuOpen) {
                // л©”лүҙ м—ҙкё°
                calculateDynamicMenuStyles();
                mobileMenu.style.display = 'block';
                mobileMenu.classList.add('show');
                hamburgerBtn.classList.add('active');
                document.body.style.overflow = 'hidden';
                
                console.log('вң… Mobile menu opened');
            } else {
                // л©”лүҙ лӢ«кё°
                mobileMenu.classList.remove('show');
                hamburgerBtn.classList.remove('active');
                document.body.style.overflow = 'auto';
                
                setTimeout(() => {
                    if (!mobileMenuOpen) {
                        mobileMenu.style.display = 'none';
                    }
                }, 300);
                
                console.log('вң… Mobile menu closed');
            }
        }

        // лӘЁл°”мқј л©”лүҙ мҙҲкё°нҷ”
        function initMobileMenu() {
            const hamburgerBtn = document.getElementById('hamburger-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', toggleMobileMenu);
                console.log('вң… Hamburger button initialized');
            } else {
                console.error('вқҢ Hamburger button not found');
            }

            if (mobileMenu) {
                console.log('вң… Mobile menu found');
            } else {
                console.error('вқҢ Mobile menu not found');
            }

            // л©”лүҙ л§ҒнҒ¬ нҒҙлҰӯ мӢң лӢ«кё°
            const mobileNav = document.getElementById('mobile-navigation');
            if (mobileNav) {
                mobileNav.addEventListener('click', (e) => {
                    if (e.target.tagName === 'A') {
                        toggleMobileMenu();
                    }
                });
            }

            // нҷ”л©ҙ нҒ¬кё° ліҖкІҪ мӢң лҸҷм Ғ мҠӨнғҖмқј мһ¬кі„мӮ° л°Ҹ лӘЁл°”мқј л©”лүҙ мһҗлҸҷ лӢ«кё°
            window.addEventListener('resize', () => {
                if (mobileMenuOpen) {
                    // 768pxмқ„ л„ҳм–ҙк°Җл©ҙ лӘЁл°”мқј л©”лүҙ мһҗлҸҷ лӢ«кё°
                    if (window.innerWidth > 768) {
                        toggleMobileMenu();
                    } else {
                        calculateDynamicMenuStyles();
                    }
                }
            });
        }

        // нҺҳмқҙм§Җ лЎңл“ң мӢң м»ҙнҸ¬л„ҢнҠё лЎңл“ң л°Ҹ нҸ¬нҠёнҸҙлҰ¬мҳӨ лЎңл“ң
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('рҹҺЁ м№ҙн…Ңкі лҰ¬ нҺҳмқҙм§Җ мҙҲкё°нҷ” мӢңмһ‘...');
            console.log('рҹ“Ұ Firebase мғҒнғң:', !!window.firebase);
            console.log('рҹ”§ FirebaseService мғҒнғң:', !!window.firebaseService);
            console.log('рҹ§ӯ NavigationManager мғҒнғң:', !!window.navigationManager);

            console.log('рҹ”„ м»ҙнҸ¬л„ҢнҠё лЎңл”© мӢңмһ‘...');
            await loadComponent('header-placeholder', 'components/header.html');
            await loadComponent('footer-placeholder', 'components/footer.html');
            console.log('вң… м»ҙнҸ¬л„ҢнҠё лЎңл”© мҷ„лЈҢ');

            // лӘЁл°”мқј л©”лүҙ мҙҲкё°нҷ”
            initMobileMenu();

            const categoryId = getCategoryIdFromUrl() || 'design'; // кё°ліёк°’ 'design'
            document.title = `${categoryId.charAt(0).toUpperCase() + categoryId.slice(1)} - lapillo`; // нҺҳмқҙм§Җ нғҖмқҙнӢҖ м—…лҚ°мқҙнҠё

            // NavigationManager мҙҲкё°нҷ” л°Ҹ м—…лҚ°мқҙнҠё
            if (window.navigationManager) {
                window.navigationManager.currentPage = categoryId; // нҳ„мһ¬ нҺҳмқҙм§Җ м„Өм •
                await window.navigationManager.updateNavigation();
                window.navigationManager.setActiveMenu(categoryId); // нҳ„мһ¬ м№ҙн…Ңкі лҰ¬ л©”лүҙ нҷңм„ұнҷ”
                console.log('вң… л„Өл№„кІҢмқҙм…ҳ м—…лҚ°мқҙнҠё мҷ„лЈҢ');
            } else {
                console.warn('вҡ пёҸ NavigationManagerк°Җ м—ҶмҠөлӢҲлӢӨ');
            }

            await loadCategoryPortfolios(categoryId);
            console.log('вң… м№ҙн…Ңкі лҰ¬ нҺҳмқҙм§Җ мҙҲкё°нҷ” мҷ„лЈҢ');
        });
    </script>
</body>
</html>
